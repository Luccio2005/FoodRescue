<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <title>Iniciar Sesion</title>
    </head>
    <body>
        <div class="container">
        <header class="header">
        <h2>INICIAR SESION</h2>
        </header>
        <main class="formulario">
        <form action="#" method="post">
            <label for="usuario">Usuario</label>
            <input type="text" id="usuario" name="usuario" placeholder="Ingrese su usuario" required /> <br><br>
            <label for="contrasena">Contraseña</label>
            <input type="password" id="contrasena" name="contrasena" placeholder="Ingrese su contraseña" required /> <br><br>
            <label>
                <input type="checkbox" name="recordarme" />
                Recordarme
            </label><br>
            <input type="submit" value="Ingresar" />
            <p>¿No tienes cuenta?
            <a href="registrar.html">Registrate aqui</a>
            </p>
        </form>
        </main>
        <footer class="footer">
            <p>
            📧 contacto@foodrescue.com
            </p>
            <p>
            Facebook |
            Instagram |
            WhatsApp
            </p>
            <p>
            © 2026 Food Rescue
            </p>
        </footer>
        </div>
    </body>
    <style>
    @keyframes aparecer{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
    }
    @keyframes bajar{
    from{
        opacity:0;
        transform:translateY(-30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
    }
    @keyframes subir{
    from{

        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
    }
    :root{
        --colorPrincipal:#2E8B57;
        --colorFondo:#E8F5E9;
        --colorBlanco:#FFFFFF;
        --colorTexto:#333333;
    }
    body{
        margin:0;
        font-family:Arial, Helvetica, sans-serif;
        background:var(--colorFondo);
        color:var(--colorTexto);
    }
    h2{
        font-size:32px;
        font-weight:bold;
        color:white;
    }
    p{
        font-size:16px;
        color:var(--colorTexto);
    }
    label{
        font-size:16px;
        font-weight:bold;
        color:var(--colorTexto);
    }
    input{
        font-size:15px;
        background:white;
        color:var(--colorTexto);
        width:100%;
        padding:10px;
        margin-top:5px;
        border-radius:5px;
        border:1px solid lightgray;
        box-sizing:border-box;
        transition: border-color .3s, box-shadow .3s;
    }
    input:focus{
        border-color:var(--colorPrincipal);
        box-shadow:0 0 5px rgba(46,139,87,.4);
        outline:none;
    }
    input[type="submit"]{
        font-size:16px;
        font-weight:bold;
        background:var(--colorPrincipal);
        color:white;
        width:100%;
        padding:12px;
        border:none;
        border-radius:5px;
        transition: opacity .3s;
    }
    input[type="submit"]:hover{
        opacity:.8;
        cursor:pointer;
    }
    input[type="checkbox"]{
        width: auto;
        padding: 0;
        margin: 0;
    }
    a{
        color:var(--colorPrincipal);
        text-decoration:none;
        font-weight:bold;
        display:inline-block;
        margin-top:10px;
        transition:color .3s;
    }
    a:hover{
        color:black;
    }
    .container{
        display:grid;

        grid-template-columns:1fr;

        grid-template-rows:auto 1fr auto;

        grid-template-areas:
        "header"
        "formulario"
        "footer";

        min-height:100vh;
    }
    .header{    
        grid-area:header;
        background:var(--colorPrincipal);
        color:white;
        padding:25px;
        text-align:center;
        font-size:20px;
        animation: bajar .8s ease;
    }
    .header p{
        color:white;
    }
    .formulario{
        grid-area:formulario;
        display:flex;
        justify-content:center;
        align-items:center;
    }
    form{
        background:white;
        padding:30px;
        width:350px;
        border-radius:10px;
        box-shadow:0px 2px 8px lightgray;
        display:flex;
        flex-direction:column;
        transition: box-shadow .3s;
        animation: aparecer .8s ease;
    }
    form:hover{
        box-shadow:0px 8px 18px lightgray;
    }
    .footer{
        grid-area:footer;
        background:var(--colorPrincipal);
        color:white;
        text-align:center;
        padding:10px;
        animation: subir .8s ease;
    }
    .footer p{
        color:white;
    }
    /* TABLETS  */
    @media (max-width:768px){
        form{
            width:80%;
        }
    }
    /*  CELULARES  */
    @media (max-width:480px){
        h2{
            font-size:26px;
        }
        form{
            width:90%;
            padding:20px;
        }
        .header{
            padding:20px;
        }
    }
    </style>
</html>
