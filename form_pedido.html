<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Formulario de Pedido</title>

<style>

@keyframes aparecer{
from{
    opacity:0;
    transform:translateY(25px);
}
to{
    opacity:1;
    transform:translateY(0);
}
}

@keyframes bajar{
from{
    opacity:0;
    transform:translateY(-30px);
}
to{
    opacity:1;
    transform:translateY(0);
}
}

@keyframes subir{
from{
    opacity:0;
    transform:translateY(30px);
}
to{
    opacity:1;
    transform:translateY(0);
}
}
@keyframes AcercaForm{

0%{
    opacity:0;
    transform:scale(0.85) translateY(30px);
    box-shadow:0 0 0 rgba(0,0,0,0);
}

100%{
    opacity:1;
    transform:scale(1) translateY(0);
    box-shadow:0 15px 35px rgba(0,0,0,.25);
}
}
:root{
    --colorPrincipal:#2E8B57;
    --colorFondo:#E8F5E9;
    --colorBlanco:#FFFFFF;
    --colorTexto:#333333;
}

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:var(--colorFondo);
    color:var(--colorTexto);
}

h2{
    font-size:32px;
    color:white;
}

p{
    font-size:16px;
    color:var(--colorTexto);
}

label{
    font-size:16px;
    font-weight:bold;
}

input,
select{

    width:100%;
    padding:10px;
    margin-top:5px;
    font-size:15px;

    border:1px solid lightgray;
    border-radius:5px;

    box-sizing:border-box;

    transition:border-color .3s, box-shadow .3s;

}

input:focus,
select:focus{

    border-color:var(--colorPrincipal);

    box-shadow:0 0 5px rgba(46,139,87,.4);

    outline:none;

}

button{

    width:100%;

    padding:12px;

    font-size:16px;

    font-weight:bold;

    background:var(--colorPrincipal);

    color:white;

    border:none;

    border-radius:5px;

    transition:opacity .3s;

}

button:hover{

    opacity:.8;

    cursor:pointer;

}

a{

    color:var(--colorPrincipal);

    text-decoration:none;

    font-weight:bold;

    transition:color .3s;

}

a:hover{

    color:black;

}

.container{

    display:grid;

    grid-template-columns:1fr;

    grid-template-rows:auto 1fr auto;

    grid-template-areas:

    "header"

    "formulario"

    "footer";

    min-height:100vh;

}

.header{

    grid-area:header;

    background:var(--colorPrincipal);

    color:white;

    text-align:center;

    padding:25px;

    animation:bajar .8s ease;

}

.header p{

    color:white;

}

.formulario{

    grid-area:formulario;

    display:flex;

    justify-content:center;

    align-items:center;

}

form{

    width:420px;

    background:white;

    padding:30px;

    border-radius:10px;

    box-shadow:0px 2px 8px lightgray;

    display:flex;

    flex-direction:column;

    animation:Acercaform 1s ease;

    transition:transform .4s, box-shadow .4s;

}

form:hover{
    transform:scale(1.02);

    box-shadow:0px 8px 18px lightgray;

}

.botones{

    display:flex;

    justify-content:center;

    gap:20px;

    margin-top:20px;

    flex-wrap:wrap;

}

.footer{

    grid-area:footer;

    background:var(--colorPrincipal);

    color:white;

    text-align:center;

    padding:20px;

    animation:subir .8s ease;

}

.footer p{

    color:white;

}

/* TABLETS */

@media(max-width:768px){

    form{

        width:80%;

    }

}

/* CELULARES */

@media(max-width:480px){

    h2{

        font-size:26px;

    }

    form{

        width:90%;

        padding:20px;

    }

    .header{

        padding:20px;

    }

    .botones{

        flex-direction:column;

        align-items:center;

    }

}

</style>

</head>

<body>

<div class="container">

<header class="header">

<h2>FORMULARIO DE PEDIDO</h2>

<p>Completa tus datos para realizar el pedido.</p>

</header>

<main class="formulario">

<form>

<label>Nombre del cliente</label>
<input type="text" placeholder="Ingrese su nombre" required>

<br>

<label>Dirección</label>
<input type="text" placeholder="Ingrese su dirección" required>

<br>

<label>Teléfono</label>
<input type="tel" placeholder="999999999" required>

<br>

<label>Seleccione un producto</label>

<select>

<option>Pizza Familiar</option>

<option>Hamburguesa + Papas</option>

<option>Pollo a la Brasa</option>

<option>Lasaña</option>

<option>Ensalada César</option>

</select>

<br>

<label>Cantidad</label>

<input type="number" min="1" max="20" required>

<br>

<button>

Enviar Pedido

</button>

<div class="botones">

<a href="menu.html">

← Volver al Menú

</a>

<a href="index.html">

🏠 Inicio

</a>

</div>

</form>

</main>

<footer class="footer">

<p>📧 contacto@foodrescue.com</p>

<p>Facebook | Instagram | WhatsApp</p>

<p>© 2026 Food Rescue</p>

</footer>

</div>

</body>
</html>
